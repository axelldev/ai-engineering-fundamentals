<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>AI Engineering Fundamentals</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua",
          Georgia, serif;
        background:
          radial-gradient(circle at top, #f6efe4 0%, #efe2ce 36%, #e6d2b5 100%);
        color: #1f1b16;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 48px auto;
        padding: 32px;
        border: 1px solid rgba(78, 56, 34, 0.15);
        border-radius: 24px;
        background: rgba(255, 249, 240, 0.86);
        box-shadow: 0 22px 70px rgba(82, 56, 24, 0.14);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.2rem, 5vw, 3.6rem);
        line-height: 0.96;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 24px;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      form {
        display: grid;
        gap: 16px;
      }

      textarea {
        width: 100%;
        min-height: 140px;
        padding: 16px 18px;
        border: 1px solid rgba(78, 56, 34, 0.22);
        border-radius: 18px;
        background: rgba(255, 252, 246, 0.95);
        color: inherit;
        font: inherit;
        resize: vertical;
      }

      button {
        width: fit-content;
        padding: 12px 18px;
        border: 0;
        border-radius: 999px;
        background: #8f3d2e;
        color: #fffaf5;
        font: inherit;
        cursor: pointer;
      }

      section {
        margin-top: 24px;
        padding: 18px;
        border-radius: 18px;
        background: rgba(255, 252, 246, 0.78);
        border: 1px solid rgba(78, 56, 34, 0.12);
      }

      .label {
        margin: 0 0 8px;
        font-size: 0.86rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #72553c;
      }

      #status {
        min-height: 1.5em;
      }

      #response {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <div class="label">Response</div>
        <pre id="response" data-response></pre>
      </section>
      <button id="sendButton">Send</button>
    </main>

    <script type="module" src="/index.ts"></script>
  </body>
</html>
